<!DOCTYPE html>

<title>My Workout</title>
<style>

body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:100px;font-size:17px}
.header{background:#1a1a1a;padding:16px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a2a2a}
.app-title{font-size:14px;color:#888;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px}

.day-tab.active{background:#fff;color:#000}
.day-tab.inactive{background:#2a2a2a;color:#aaa}

.day-header{padding:16px 16px 8px}
.day-title{font-size:24px;font-weight:700;margin-bottom:4px}
.day-subtitle{font-size:14px;color:#888}
.duration-badge{display:inline-block;background:#2a2a2a;color:#aaa;font-size:13px;padding:3px 10px;border-radius:12px;margin-top:6px}
.section-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;padding:12px 16px 6px}
.exercise-card{margin:4px 8px;background:#1a1a1a;border-radius:14px;overflow:hidden}
.exercise-header{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer}

.exercise-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}

.chevron{font-size:13px;color:#555;transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.exercise-detail{padding:0 16px 14px;border-top:1px solid #252525}
.warning-box{background:#2a1f00;border:1px solid #ff9f0a;border-radius:10px;padding:10px 12px;margin:10px 0;font-size:14px;color:#ff9f0a;line-height:1.5}
.sets-container{margin:10px 0}
.set-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1f1f1f}
.set-row:last-child{border-bottom:none}
.set-label{font-size:13px;color:#666;width:36px;flex-shrink:0}
.set-input{background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#f0f0f0;font-size:14px;padding:6px 8px;text-align:center;font-family:inherit}
.set-input:focus{outline:none;border-color:#444}
.set-check{width:38px;height:38px;border-radius:50%;border:2px solid #333;background:transparent;color:#888;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-check.done{background:#30d158;border-color:#30d158;color:#000}
.set-unit{font-size:12px;color:#555;width:26px;flex-shrink:0}
.rest-timer-btn{margin:10px 0 4px;background:#2a2a2a;border:none;color:#aaa;padding:9px 18px;border-radius:10px;font-size:14px;cursor:pointer}
.notes-input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:15px;padding:10px 12px;margin-top:8px;resize:none;font-family:inherit}
.notes-input::placeholder{color:#444}
.notes-input:focus{outline:none;border-color:#444}
.timer-overlay{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:#1a1a1a;border-top:1px solid #2a2a2a;padding:16px;z-index:200;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.timer-overlay.visible{transform:translateY(0)}
.timer-label{font-size:13px;color:#888;text-align:center;margin-bottom:8px}
.timer-display{font-size:57px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-2px}
.timer-display.active{color:#30d158}
.timer-display.done{color:#ff6b6b}
.timer-controls{display:flex;gap:8px;margin-top:12px}
.timer-btn{flex:1;padding:14px;border-radius:14px;border:none;font-size:17px;font-weight:600;cursor:pointer}
.timer-start{background:#30d158;color:#000}
.timer-stop{background:#2a2a2a;color:#f0f0f0}
.interval-card{margin:4px 8px;background:#1a1a1a;border-radius:14px;padding:16px}
.interval-title{font-size:17px;font-weight:600;margin-bottom:10px}
.interval-phase{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:6px}
.interval-phase.work{color:#ff6b6b}

.interval-time{font-size:53px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-2px}
.interval-rounds{font-size:15px;color:#888;margin-top:6px}
.interval-controls{display:flex;gap:8px;margin-top:12px}
.coach-card{margin:4px 8px 12px;background:#1c1c1c;border-radius:14px;padding:14px 16px;border-left:3px solid #555}
.coach-label{font-size:12px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.coach-text{font-size:14px;color:#999;line-height:1.6}
.reset-btn{margin:16px 8px 4px;width:calc(100% - 16px);padding:14px;border-radius:14px;background:#2a2a2a;border:none;color:#888;font-size:15px;cursor:pointer;font-weight:500}
.export-btn{margin:4px 8px 0;width:calc(100% - 16px);padding:14px;border-radius:14px;background:#1a2a1a;border:1px solid #2a4a2a;color:#30d158;font-size:15px;cursor:pointer;font-weight:500}
.rest-day-card{margin:20px 8px;background:#1a1a1a;border-radius:16px;padding:28px 20px;text-align:center}

.mobility-row:last-child{border-bottom:none}

        {name:'Hip circles + leg swings',sets:1,reps:'2 min',weight:'Bodyweight',rest:null},

        {name:'Romanian Deadlift',sets:4,reps:'8',weight:'60–75 lbs DBs / 135–185 lbs barbell',rest:'2 min',choices:['DB Romanian Deadlift','Barbell Romanian Deadlift']},

  },
  3:{
    sections:[
      {label:'Warm-up',type:'cardio',items:[
        {name:'Elliptical — very light',duration:'10 min',intensity:'Level 2–3',hr:'<110 bpm'},
      ]},
      {label:'Interval Block',type:'interval',protocol:'thursday'},
      {label:'Zone 2 Cool-Down Cardio',type:'cardio',items:[
        {name:'Elliptical or bike — easy',duration:'15–20 min',intensity:'Conversational',hr:'115–135 bpm'},
      ]},
      {label:'Mobility',type:'mobility',items:[
        {name:'Foam roll — quads, IT band, upper back, lats',area:'Full body',duration:'5–6 min'},
        {name:'Kneeling lunge / couch stretch',area:'Hip flexors',duration:'90 sec/side'},
        {name:'Foam roller T-spine extension + rotations',area:'Thoracic spine',duration:'4 min'},
        {name:'Full body stretch — 30–45 sec holds',area:'All areas',duration:'8 min'},

    sections:[
      {label:'Warm-up',type:'exercises',items:[
        {name:'Elliptical — light resistance',sets:1,reps:'10 min',weight:'Level 3–4',rest:null},
        {name:'Dynamic stretch circuit',sets:1,reps:'3 min',weight:'Bodyweight',rest:null},
      ]},
      {label:'Main Work — Compound Focus',type:'exercises',items:[
        {name:'Deadlift',sets:3,reps:'6–8',weight:'80–100 lbs DBs / 185–225 lbs trap bar',rest:'90 sec',choices:['DB Deadlift','Trap Bar Deadlift']},
        {name:'Incline DB press',sets:3,reps:'10',weight:'40–50% of normal load',rest:'90 sec',injury:true,injuryNote:'Light load only — 40–50% normal. Stop reps before full elbow extension. Pain >2–3/10 = stop the set.'},
        {name:'Single-arm DB row',sets:3,reps:'10/side',weight:'60–75 lbs',rest:'90 sec'},
        {name:'Goblet squat',sets:3,reps:'12',weight:'50–60 lbs DB',rest:'90 sec'},
        {name:'Farmer carries',sets:3,reps:'40 yards',weight:'50–60 lbs/hand',rest:'60 sec'},

let currentDay=new Date().getDay();
currentDay=currentDay===0?6:currentDay-1;

let completedSets   =JSON.parse(localStorage.getItem('wk_sets')||'{}');
let setWeights      =JSON.parse(localStorage.getItem('wk_weights')||'{}');
let setReps         =JSON.parse(localStorage.getItem('wk_reps')||'{}');
let sessionHistory  =JSON.parse(localStorage.getItem('wk_history')||'{}');
let notes           =JSON.parse(localStorage.getItem('wk_notes')||'{}');
let cardioNotes     =JSON.parse(localStorage.getItem('wk_cardionotes')||'{}');
let choiceSelections=JSON.parse(localStorage.getItem('wk_choices')||'{}');
let openCardioNotes ={};

let timerInterval=null,timerSeconds=0,timerRunning=false;
let mobTimers={};
let intervalTimer=null,intervalRunning=false;
let intervalState={phase:'work',round:1,seconds:0,protocol:''};

function saveData(){
  localStorage.setItem('wk_sets',JSON.stringify(completedSets));
  localStorage.setItem('wk_weights',JSON.stringify(setWeights));
  localStorage.setItem('wk_reps',JSON.stringify(setReps));
  localStorage.setItem('wk_history',JSON.stringify(sessionHistory));
  localStorage.setItem('wk_notes',JSON.stringify(notes));
  localStorage.setItem('wk_cardionotes',JSON.stringify(cardioNotes));
  localStorage.setItem('wk_choices',JSON.stringify(choiceSelections));
}

function setKey(d,s,i){return `d${d}_s${s}_i${i}`;}
function noteKey(d,s,i){return `n${d}_s${s}_i${i}`;}
function weightKey(d,s,i,n){return `d${d}_s${s}_i${i}_set${n}_w`;}
function repsKey(d,s,i,n){return `d${d}_s${s}_i${i}_set${n}_r`;}
function historyKey(d,s,i){return `hist_d${d}_s${s}_i${i}`;}
function choiceKey(d,s,i){return `ch_d${d}_s${s}_i${i}`;}
function cardioNoteKey(d,s,i){return `cn_d${d}_s${s}_i${i}`;}

function saveNote(k,v){notes[k]=v;saveData();}
function saveCardioNote(k,v){cardioNotes[k]=v;saveData();}
function saveWeight(k,v){setWeights[k]=v;saveData();}
function saveRepsVal(k,v){setReps[k]=v;saveData();}

// Round DOWN to nearest 5-lb increment
function roundDown5(val){return Math.floor(val/5)*5;}

// Returns suggestion object or null
// Locks weight at rounded-down value until 3 consecutive sessions all reps hit
function getSuggestion(d,s,i,targetReps){
  const hk=historyKey(d,s,i);
  const raw=sessionHistory[hk];
  if(!raw) return null;
  const sessions=Array.isArray(raw)?raw:[raw];
  if(!sessions.length) return null;

  const repRange=targetReps?targetReps.replace(/\/.*/,'').split('–'):null;
  const topRep=repRange?parseInt(repRange[repRange.length-1]):null;

  const last=sessions[sessions.length-1];
  const avgW=last.sets.reduce((a,b)=>a+(b.weight||0),0)/(last.sets.length||1);
  if(!avgW) return null;

  // Count consecutive sessions where all sets hit topRep at approx same weight
  let streak=0;
  for(let j=sessions.length-1;j>=0;j--){
    const sess=sessions[j];
    const sAvg=sess.sets.reduce((a,b)=>a+(b.weight||0),0)/(sess.sets.length||1);
    const allHit=topRep?sess.sets.every(s=>s.reps>=topRep):false;
    if(allHit&&Math.abs(sAvg-avgW)<3){streak++;}else{break;}
  }

  if(streak>=3){
    // Progress: raw +5, rounded down to nearest 5
    const nextRaw=avgW+5;
    const nextRounded=roundDown5(nextRaw);
    return{weight:nextRounded,note:`Ready to progress → ${nextRounded} lbs (rounded down to nearest 5)`,locked:false,streak};
  } else {
    // Stay: round current weight down to nearest 5
    const stayRounded=roundDown5(avgW);
    return{weight:stayRounded,note:`Stay at ${stayRounded} lbs — hit all reps ${streak}/3 sessions needed`,locked:true,streak};
  }
}

function selectChoice(d,s,i,choice){
  choiceSelections[choiceKey(d,s,i)]=choice;
  saveData();renderDay();
}

function toggleCardioNotes(k){
  openCardioNotes[k]=!openCardioNotes[k];
  renderDay();
}

function toggleSet(d,s,i,n){
  const k=setKey(d,s,i);
  if(!completedSets[k])completedSets[k]=[];
  const pos=completedSets[k].indexOf(n);
  if(pos===-1)completedSets[k].push(n);
  else completedSets[k].splice(pos,1);
  saveData();renderDay();
}

function saveSessionAndReset(day){
  const workout=WORKOUTS[day];
  if(!workout||workout.rest) return;
  workout.sections.forEach((sec,secIdx)=>{
    if(sec.type!=='exercises') return;
    sec.items.forEach((ex,exIdx)=>{
      const k=setKey(day,secIdx,exIdx);
      const done=completedSets[k]||[];
      if(!done.length) return;
      const sets=done.map(n=>({
        setNum:n,
        weight:parseFloat(setWeights[weightKey(day,secIdx,exIdx,n)])||0,
        reps:parseInt(setReps[repsKey(day,secIdx,exIdx,n)])||0
      }));
      const hk=historyKey(day,secIdx,exIdx);
      const existing=sessionHistory[hk];
      let arr=Array.isArray(existing)?existing:(existing?[existing]:[]);
      arr.push({date:new Date().toLocaleDateString(),sets});
      if(arr.length>3)arr=arr.slice(-3);
      sessionHistory[hk]=arr;
    });
  });
  Object.keys(completedSets).filter(k=>k.startsWith(`d${day}_`)).forEach(k=>delete completedSets[k]);
  saveData();renderDay();
}

function exportData(){
  const lines=['MY WORKOUT LOG — '+new Date().toLocaleDateString(),''];
  [0,2,4].forEach(day=>{
    const workout=WORKOUTS[day];
    if(!workout||workout.rest) return;
    let dayHas=false;
    workout.sections.forEach((sec,secIdx)=>{
      if(sec.type!=='exercises') return;
      sec.items.forEach((ex,exIdx)=>{
        const hk=historyKey(day,secIdx,exIdx);
        const hist=sessionHistory[hk];
        if(!hist) return;
        const sessions=Array.isArray(hist)?hist:[hist];
        if(!dayHas){lines.push('=== '+FULL_DAYS[day]+' ===');dayHas=true;}
        lines.push(ex.name);
        sessions.forEach(sess=>{
          lines.push('  '+sess.date+':');
          sess.sets.forEach(s=>lines.push('    Set '+s.setNum+': '+(s.weight||'—')+' lbs × '+(s.reps||'—')+' reps'));
        });
        lines.push('');
      });
    });
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='workout-log.txt';a.click();
  URL.revokeObjectURL(url);
}

function buildTabs(){
  const container=document.getElementById('dayTabs');
  container.innerHTML='';
  DAYS.forEach((d,i)=>{
    const btn=document.createElement('button');
    const isRest=i>=5;
    btn.className='day-tab '+(i===currentDay?'active':isRest?'rest':'inactive');
    btn.textContent=d;
    btn.onclick=()=>{currentDay=i;buildTabs();renderDay();};
    container.appendChild(btn);
  });
}

function openRestTimer(seconds,label){
  timerSeconds=seconds;timerRunning=false;clearInterval(timerInterval);
  document.getElementById('timerLabel').textContent=label||'Rest Timer';
  document.getElementById('timerDisplay').textContent=formatTime(seconds);
  document.getElementById('timerDisplay').className='timer-display';
  document.getElementById('timerStartBtn').textContent='Start';
  document.getElementById('timerOverlay').classList.add('visible');
}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('timerStartBtn').textContent='Resume';
    document.getElementById('timerDisplay').className='timer-display';
  } else {
    timerRunning=true;
    document.getElementById('timerStartBtn').textContent='Pause';
    timerInterval=setInterval(()=>{
      timerSeconds--;
      if(timerSeconds<=0){
        timerSeconds=0;clearInterval(timerInterval);timerRunning=false;
        document.getElementById('timerStartBtn').textContent='Done!';
        document.getElementById('timerDisplay').className='timer-display done';
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }
      const el=document.getElementById('timerDisplay');
      if(el)el.textContent=formatTime(timerSeconds);
    },1000);
  }
}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerOverlay').classList.remove('visible');}
function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function startIntervalTimer(protocol){
  const config=protocol==='thursday'?{workSec:60,restSec:120,totalRounds:6}:{workSec:30,restSec:90,totalRounds:5};
  if(intervalRunning){clearInterval(intervalTimer);intervalRunning=false;intervalState={phase:'work',round:1,seconds:config.workSec,protocol};renderDay();return;}
  intervalState={phase:'work',round:1,seconds:config.workSec,protocol,config};intervalRunning=true;
  intervalTimer=setInterval(()=>{
    intervalState.seconds--;
    if(intervalState.seconds<=0){
      if(intervalState.phase==='work'){intervalState.phase='rest';intervalState.seconds=intervalState.config.restSec;if(navigator.vibrate)navigator.vibrate([100]);}
      else{
        intervalState.round++;
        if(intervalState.round>intervalState.config.totalRounds){
          clearInterval(intervalTimer);intervalRunning=false;
          if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
          intervalState={phase:'done',round:intervalState.config.totalRounds,seconds:0,protocol,config:intervalState.config};
          renderDay();return;
        }
        intervalState.phase='work';intervalState.seconds=intervalState.config.workSec;if(navigator.vibrate)navigator.vibrate([200]);
      }
    }
    updateIntervalDisplay();
  },1000);
  renderDay();
}

function updateIntervalDisplay(){
  const phaseEl=document.getElementById('int_phase');
  const timeEl=document.getElementById('int_time');
  const roundEl=document.getElementById('int_rounds');
  if(!phaseEl)return;
  const totalRounds=intervalState.config?intervalState.config.totalRounds:6;
  phaseEl.textContent=intervalState.phase==='done'?'Complete!':intervalState.phase==='work'?'Work':'Rest';
  phaseEl.className='interval-phase '+(intervalState.phase==='work'?'work':intervalState.phase==='rest'?'rest':'');
  if(timeEl)timeEl.textContent=intervalState.phase==='done'?'0:00':formatTime(intervalState.seconds);
  if(roundEl)roundEl.textContent='Round '+Math.min(intervalState.round,totalRounds)+' of '+totalRounds;
}

function renderExercise(ex,dayIdx,secIdx,exIdx){
  const k=setKey(dayIdx,secIdx,exIdx);
  const nk=noteKey(dayIdx,secIdx,exIdx);
  const ck=choiceKey(dayIdx,secIdx,exIdx);
  const done=completedSets[k]||[];
  const total=ex.sets||1;
  const pct=Math.round((done.length/total)*100);
  const isOpen=(window._openCards||{})[k];
  const suggestion=ex.sets>1?getSuggestion(dayIdx,secIdx,exIdx,ex.reps):null;
  const selectedChoice=ex.choices?(choiceSelections[ck]||ex.choices[0]):null;

  let html=`<div class="exercise-card">`;
  html+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  html+=`<div class="exercise-header" onclick="toggleCard('${k}')">`;
  html+=`<div style="flex:1">`;
  html+=`<div class="exercise-name${ex.injury?' injury':''}">${ex.injury?'⚠️ ':''}${ex.name}</div>`;
  html+=`<div class="exercise-meta">`;
  if(ex.sets)html+=`<span class="meta-pill">${ex.sets} × ${ex.reps}</span>`;
  if(ex.weight)html+=`<span class="meta-pill">${ex.weight}</span>`;
  if(suggestion&&!suggestion.locked)html+=`<span class="suggestion-badge">↑ ${suggestion.weight} lbs</span>`;
  if(suggestion&&suggestion.locked)html+=`<span class="locked-badge">🔒 ${suggestion.weight} lbs</span>`;
  html+=`</div></div>`;
  html+=`<span class="chevron${isOpen?' open':''}">▼</span>`;
  html+=`</div>`;

  if(isOpen){
    html+=`<div class="exercise-detail">`;
    if(ex.injuryNote)html+=`<div class="warning-box">⚠️ ${ex.injuryNote}</div>`;

    // Variation selector
    if(ex.choices){
      html+=`<div style="font-size:13px;color:#666;margin:10px 0 4px">Select variation for this session:</div>`;
      html+=`<div class="choice-selector">`;
      ex.choices.forEach(c=>{
        html+=`<button class="choice-btn${selectedChoice===c?' selected':''}" onclick="selectChoice(${dayIdx},${secIdx},${exIdx},'${c}')">${c}</button>`;
      });
      html+=`</div>`;
      if(selectedChoice)html+=`<div style="font-size:13px;color:#30d158;margin-bottom:8px">Logging as: ${selectedChoice}</div>`;
    }

    // Progression suggestion + streak dots
    if(suggestion){
      const color=suggestion.locked?'#ff9f0a':'#30d158';
      const icon=suggestion.locked?'🔒':'✅';
      html+=`<div style="font-size:13px;color:${color};margin:6px 0 4px">${icon} ${suggestion.note}</div>`;
      html+=`<div class="streak-bar">`;
      for(let d=0;d<3;d++){
        html+=`<div class="streak-dot ${d<suggestion.streak?'hit':'miss'}"></div>`;
      }
      html+=`</div>`;
    }

    // Set logging rows
    if(ex.sets&&ex.sets>0){
      html+=`<div style="font-size:13px;color:#666;margin:6px 0 4px">Log weight &amp; reps per set:</div>`;
      html+=`<div class="sets-container">`;
      const hist=sessionHistory[historyKey(dayIdx,secIdx,exIdx)];
      const sessions=hist?(Array.isArray(hist)?hist:[hist]):[];
      const lastSess=sessions.length?sessions[sessions.length-1]:null;
      for(let s=1;s<=total;s++){
        const wk=weightKey(dayIdx,secIdx,exIdx,s);
        const rk=repsKey(dayIdx,secIdx,exIdx,s);
        const lastSet=lastSess?lastSess.sets.find(ls=>ls.setNum===s):null;
        const wVal=setWeights[wk]||'';
        const rVal=setReps[rk]||'';
        html+=`<div class="set-row">`;
        html+=`<span class="set-label">Set ${s}</span>`;
        html+=`<input class="set-input" type="number" inputmode="decimal" placeholder="${lastSet&&lastSet.weight?lastSet.weight:'lbs'}" value="${wVal}" onchange="saveWeight('${wk}',this.value)" style="width:66px">`;
        html+=`<span class="set-unit">lbs</span>`;
        html+=`<input class="set-input" type="number" inputmode="numeric" placeholder="${lastSet&&lastSet.reps?lastSet.reps:'reps'}" value="${rVal}" onchange="saveRepsVal('${rk}',this.value)" style="width:56px">`;
        html+=`<span class="set-unit">reps</span>`;
        html+=`<button class="set-check${done.includes(s)?' done':''}" onclick="toggleSet(${dayIdx},${secIdx},${exIdx},${s})">${done.includes(s)?'✓':'○'}</button>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }

    if(ex.rest){
      const restSecs={'30 sec':30,'60 sec':60,'90 sec':90,'2 min':120,'2–3 min':150,'3 min':180}[ex.rest]||60;
      html+=`<button class="rest-timer-btn" onclick="openRestTimer(${restSecs},'Rest: ${ex.rest}')">⏱ Start ${ex.rest} rest</button>`;
    }
    const savedNote=notes[nk]||'';
    html+=`<textarea class="notes-input" rows="2" placeholder="Additional notes..." onchange="saveNote('${nk}',this.value)">${savedNote}</textarea>`;
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function renderCardioItem(item,dayIdx,secIdx,itemIdx){
  const cnk=cardioNoteKey(dayIdx,secIdx,itemIdx);
  const isOpen=openCardioNotes[cnk];
  const savedNote=cardioNotes[cnk]||'';
  let html=`<div class="cardio-row">`;
  html+=`<div class="cardio-row-top">`;
  html+=`<div><div class="cardio-name">${item.name}</div><div class="cardio-detail">${item.duration} · ${item.intensity}</div></div>`;
  if(item.hr)html+=`<div class="cardio-badge">${item.hr}</div>`;
  html+=`</div>`;
  html+=`<button class="cardio-notes-toggle" onclick="toggleCardioNotes('${cnk}')">${isOpen?'▲ Hide notes':'▼ Log session notes'}</button>`;
  if(isOpen){
    html+=`<textarea class="notes-input" rows="3" placeholder="Equipment · resistance level · actual HR · duration · how it felt..." onchange="saveCardioNote('${cnk}',this.value)">${savedNote}</textarea>`;
  } else if(savedNote){
    html+=`<div class="cardio-note-preview">${savedNote.substring(0,70)}${savedNote.length>70?'…':''}</div>`;
  }
  html+=`</div>`;
  return html;
}

function toggleCard(k){
  if(!window._openCards)window._openCards={};
  window._openCards[k]=!window._openCards[k];
  renderDay();
}

function startMobTimer(mk){
  if(mobTimers[mk]&&mobTimers[mk].interval){clearInterval(mobTimers[mk].interval);delete mobTimers[mk];renderDay();return;}
  const getDur=(mk)=>{
    const parts=mk.split('_');
    const secIdx=parseInt(parts[2]);const mobIdx=parseInt(parts[3]);
    const sec=WORKOUTS[currentDay]?.sections?.[secIdx];
    const dur=sec?.items?.[mobIdx]?.duration||'60 sec';
    if(dur.includes('90 sec'))return 90;if(dur.includes('2 min'))return 120;
    if(dur.includes('3 min'))return 180;if(dur.includes('4 min'))return 240;
    if(dur.includes('5')||dur.includes('6'))return 330;if(dur.includes('8'))return 480;
    return 60;
  };
  let secs=getDur(mk);
  mobTimers[mk]={secs,display:formatTime(secs)};
  mobTimers[mk].interval=setInterval(()=>{
    secs--;
    if(secs<=0){clearInterval(mobTimers[mk].interval);if(navigator.vibrate)navigator.vibrate([200,100,200]);mobTimers[mk].display='Done!';}
    else{mobTimers[mk].display=formatTime(secs);}
    const btnEl=document.querySelector(`[data-mobtimer="${mk}"]`);
    if(btnEl){btnEl.textContent=mobTimers[mk].display;btnEl.className='mob-timer-btn running';}
  },1000);
  renderDay();
}

function renderDay(){
  const workout=WORKOUTS[currentDay];
  let html='';
  html+=`<div class="day-header"><div class="day-title">${FULL_DAYS[currentDay]}</div><div class="day-subtitle">${SUBTITLES[currentDay]}</div>`;
  if(DURATIONS[currentDay])html+=`<div class="duration-badge">${DURATIONS[currentDay]}</div>`;
  html+=`</div>`;

  if(workout.rest){
    html+=`<div class="rest-day-card"><div style="font-size:44px;margin-bottom:12px">🚶</div><div class="rest-day-title">Rest Day</div><div class="rest-day-text">2-mile walk at comfortable pace<br>Extra sleep and recovery prioritized<br><br>No structured training today.</div></div>`;
    document.getElementById('appContent').innerHTML=html;return;
  }

  workout.sections.forEach((sec,secIdx)=>{
    html+=`<div class="section-label">${sec.label}</div>`;
    if(sec.type==='exercises'){
      sec.items.forEach((ex,exIdx)=>{html+=renderExercise(ex,currentDay,secIdx,exIdx);});
    } else if(sec.type==='cardio'){
      html+=`<div class="cardio-card">`;
      sec.items.forEach((item,itemIdx)=>{html+=renderCardioItem(item,currentDay,secIdx,itemIdx);});
      html+=`</div>`;
    } else if(sec.type==='mobility'){
      html+=`<div class="mobility-card">`;
      sec.items.forEach((item,mi)=>{
        const mk=`mob_${currentDay}_${secIdx}_${mi}`;
        const isRunning=mobTimers[mk];
        html+=`<div class="mobility-row"><div style="flex:1"><div class="mob-name">${item.name}</div><div style="font-size:13px;color:#666;margin-top:2px">${item.area} · ${item.duration}</div></div>`;
        html+=`<button class="mob-timer-btn${isRunning?' running':''}" data-mobtimer="${mk}" onclick="startMobTimer('${mk}')">${isRunning?isRunning.display:'Timer'}</button>`;
        html+=`</div>`;
      });
      html+=`</div>`;
    } else if(sec.type==='interval'){
      const cfg=sec.protocol==='thursday'
        ?{work:'1 min hard',rest:'2 min easy',rounds:6,hrTarget:'150–165 bpm'}
        :{work:'30 sec sprint',rest:'90 sec easy',rounds:5,hrTarget:'160–170 bpm'};
      html+=`<div class="interval-card">`;
      html+=`<div class="interval-title">${sec.protocol==='thursday'?'6 Rounds · 1:2 Work/Rest':'5 Rounds · HIIT Finisher'}</div>`;
      html+=`<div style="font-size:14px;color:#666;margin-bottom:12px">${cfg.work} / ${cfg.rest} · <span style="color:#ff6b6b">${cfg.hrTarget}</span></div>`;
      if((intervalRunning&&intervalState.protocol===sec.protocol)||(intervalState.phase==='done'&&intervalState.protocol===sec.protocol)){
        html+=`<div style="text-align:center;padding:12px 0">`;
        html+=`<div class="interval-phase${intervalState.phase==='work'?' work':intervalState.phase==='rest'?' rest':''}" id="int_phase">${intervalState.phase==='done'?'Complete!':intervalState.phase==='work'?'Work':'Rest'}</div>`;
        html+=`<div class="interval-time" id="int_time">${intervalState.phase==='done'?'0:00':formatTime(intervalState.seconds)}</div>`;
        html+=`<div class="interval-rounds" id="int_rounds">Round ${Math.min(intervalState.round,cfg.rounds)} of ${cfg.rounds}</div>`;
        html+=`</div>`;
      }
      const btnLabel=(intervalRunning&&intervalState.protocol===sec.protocol)?'Stop Timer':(intervalState.phase==='done'&&intervalState.protocol===sec.protocol)?'Restart':'Start Timer';
      html+=`<div class="interval-controls"><button class="timer-btn timer-start" onclick="startIntervalTimer('${sec.protocol}')" style="flex:1;padding:14px;font-size:17px">${btnLabel}</button></div>`;
      html+=`</div>`;
    } else if(sec.type==='text'){
      html+=`<div style="margin:4px 8px;background:#1a1a1a;border-radius:14px;padding:14px 16px;font-size:15px;color:#888">${sec.text}</div>`;
    }
  });

  if(workout.coach){
    html+=`<div class="coach-card"><div class="coach-label">Coach tip</div><div class="coach-text">${workout.coach}</div></div>`;
  }
  html+=`<button class="reset-btn" onclick="saveSessionAndReset(${currentDay})">✓ Finish workout &amp; save session</button>`;
  html+=`<button class="export-btn" onclick="exportData()">↓ Export workout log</button>`;
  html+=`<div style="height:20px"></div>`;
  document.getElementById('appContent').innerHTML=html;
}

buildTabs();
renderDay();
</script>
</body>
</html>
